<script>
var questions = [
["美容室の売上を伸ばす方法を分解せよ",["新規来店数を増やす","再来店率を上げる","客単価を上げる","紹介・口コミを増やす"],"売上改善のお題では、まず「売上＝客数×客単価」という数式を起点にします。ただし美容室の場合、客数の中身は新規と既存に分けた方が実務的です。新規来店数、再来店率、客単価の3つでほぼ主要因を押さえられます。さらに美容室は信頼産業なので、紹介・口コミを別の切り口として加えると、より現場で使える分解になります。ロジカルシンキングでは、いきなり施策を出す前に「どの変数を動かすのか」を明確にすることが大切です。"],
["採用活動がうまくいかない原因を分解せよ",["応募者が少ない","求める人材と合わない","選考プロセスが悪い","入社条件に魅力がない"],"採用の問題は、応募者数だけで考えると浅くなります。まず母集団形成、候補者とのマッチング、選考プロセス、条件・魅力の4つに分けると整理しやすいです。これは採用を「応募前→応募→選考→入社判断」という流れで見ている分解です。プロセスに沿って切ると、どこで詰まっているのかが見えます。MECEの訓練では、時間の流れや顧客行動の流れで切る方法を覚えると、瞬時に整理しやすくなります。"],
["飲食店の客単価を上げる方法を分解せよ",["高単価商品の追加","セット販売","追加注文の促進","価格改定"],"客単価は「一人が一回の来店でいくら使うか」です。そのため、単価の高い商品を用意する、複数商品を組み合わせる、追加注文を促す、価格そのものを見直す、という4つに分けられます。ここでは「商品構成」「買い方」「注文点数」「価格」という切り口です。ロジックツリーでは、客単価という抽象的な数字を、店側が操作できる具体的なレバーに分解することが重要です。"],
["会議が長引く原因を分解せよ",["目的が曖昧","論点が多すぎる","意思決定者が不在","進行管理が弱い"],"会議の問題は、人の話が長いという表面的な見方だけでは不十分です。目的、論点、意思決定、進行という4つに分けると、構造的に原因を把握できます。目的が曖昧だと話が広がり、論点が多すぎると収束せず、意思決定者がいないと結論が出ません。進行管理が弱いと時間内に着地できません。グループワークでも同じで、最初に目的と論点を定義するだけで議論の質が上がります。"],
["新しいアプリが使われない理由を分解せよ",["認知されていない","使う理由が弱い","操作が難しい","継続する仕組みがない"],"アプリ利用は、認知、初回利用、使いやすさ、継続という流れで考えます。このように利用者の行動プロセスに沿って分解すると、抜け漏れが少なくなります。使われない理由は、そもそも知られていないのか、価値が伝わっていないのか、使いにくいのか、継続する理由がないのかで対策が変わります。ロジカルシンキングでは、問題を一つの塊で捉えず、利用者が進むステップごとに切る発想が有効です。"],
["売れる営業担当者の特徴を分解せよ",["顧客理解力","提案力","関係構築力","行動量"],"営業力は『話がうまい』だけでは説明できません。顧客の課題を理解する力、解決策として提案する力、信頼関係を築く力、十分な接点を作る行動量の4つで見ると整理しやすくなります。これは営業成果を生む要素を、能力面と行動面に分けた考え方です。ロジックツリーでは、人物評価のような抽象テーマでも、成果に結びつく要素に分解すると議論しやすくなります。"],
["ECサイトの購入率が低い原因を分解せよ",["商品魅力が伝わらない","価格に納得できない","購入手続きが面倒","信頼感が不足している"],"ECサイトの購入率は、訪問者が購入に至るまでの心理と行動で分解します。商品が欲しいと思えない、価格に納得できない、購入手続きで離脱する、サイトや会社を信用できない、という4つです。これは顧客の購買プロセスに沿った分解です。ロジカルシンキングでは、数値低下の原因を『顧客がどこで止まっているか』に置き換えると、改善策が具体化しやすくなります。"],
["地域の空き家が増える原因を分解せよ",["所有者側の事情","需要不足","改修コスト","流通・情報不足"],"空き家問題は、建物そのものだけでなく、所有者、利用希望者、費用、情報流通の問題が絡みます。所有者が処分を決められない、買い手や借り手が少ない、改修費が高い、物件情報が流通していない、という4分類です。社会課題では、関係者ごとに分けると整理しやすいです。MECEを意識するなら『誰の問題か』『どの制約か』を考えると、一次分解が作りやすくなります。"],
["社員教育が成果につながらない原因を分解せよ",["教育内容が実務とズレている","学ぶ時間がない","上司の支援が弱い","成果確認がない"],"教育課題は、研修の中身だけでなく、学習環境、現場支援、効果測定まで見る必要があります。教育内容が実務に合っていなければ使われず、時間がなければ学べません。上司の支援がなければ現場で実践されず、成果確認がなければ改善できません。ロジカルシンキングでは、施策そのものだけでなく『実行される条件』まで分解することが大切です。"],
["観光地の満足度を高める要素を分解せよ",["観光資源の魅力","交通・アクセス","飲食・宿泊の質","接客・情報提供"],"観光地の満足度は、観光資源だけでは決まりません。行きやすさ、滞在中の飲食や宿泊、現地での案内や接客も含めた総合体験で決まります。これは顧客体験を『目的物』『移動』『滞在』『人的・情報サービス』に分けた考え方です。ロジックツリーでは、顧客が体験する一連の流れを思い浮かべると、抜け漏れの少ない分解ができます。"],
["小規模スーパーが大手に対抗する方法を分解せよ",["品揃えの差別化","地域密着サービス","鮮度・品質の強化","固定客づくり"],"小規模スーパーは、大手と同じ土俵で価格や品揃えの量を競うと不利になりがちです。そこで、地域に合った品揃え、顔の見えるサービス、鮮度や品質、固定客との関係性に分けて考えます。これは競争戦略として『大手がやりにくいこと』に注目した分解です。ロジカルシンキングでは、単に打ち手を並べるのではなく、競争優位につながる軸で切ることが重要です。"],
["価格を上げても顧客離れを防ぐ方法を分解せよ",["価値を明確に伝える","サービス品質を上げる","既存顧客へ丁寧に説明する","価格帯を複数用意する"],"値上げは価格だけの問題ではなく、顧客の納得感の問題です。価値を伝える、品質を高める、既存顧客に説明する、複数価格帯を用意するという4つで分解できます。これは『価値』『品質』『コミュニケーション』『選択肢』の切り口です。ロジカルシンキングでは、顧客離れという結果を、顧客心理の不満や不安に分解して考えることが大切です。"],
["起業直後に資金繰りが苦しくなる原因を分解せよ",["売上の立ち上がり遅れ","初期投資の過大","固定費の負担","入金と支払いのズレ"],"資金繰りは利益とは別に、現金の出入りで考える必要があります。売上が遅い、初期投資が大きい、毎月の固定費が重い、入金より支払いが先に来る、という4つで整理できます。これは『収入』『初期支出』『継続支出』『タイミング』の分解です。ロジックツリーでは、会計上の利益と現金収支を混同しないように、何を改善したいのかを明確にすることが重要です。"],
["ブランド力を高める方法を分解せよ",["コンセプトを明確にする","顧客体験を統一する","発信を継続する","口コミ・実績を積む"],"ブランドはロゴや名前だけではありません。何者なのかを示すコンセプト、実際に感じる顧客体験、継続的な発信、信頼を生む口コミや実績によって形成されます。これは『定義する』『体験させる』『伝える』『証明する』という流れの分解です。抽象的なテーマでは、ブランドを構成する要素に分けると、議論が感覚論になりにくくなります。"],
["店舗スタッフの接客品質がばらつく原因を分解せよ",["基準が明確でない","教育が不足している","現場確認が弱い","評価・フィードバックがない"],"接客品質のばらつきは、個人のやる気だけで考えると改善が難しくなります。基準、教育、確認、評価の4つに分けると、仕組みとして原因を把握できます。基準がなければ人によって判断が変わり、教育がなければ再現できず、確認とフィードバックがなければ改善されません。ロジカルシンキングでは、人の問題に見えるものを、仕組みの問題として分解する視点が大切です。"],
["SNS投稿が成果につながらない理由を分解せよ",["ターゲットが曖昧","内容が顧客ニーズとズレている","投稿頻度が不足","導線がない"],"SNSの成果は投稿数だけでは決まりません。誰に向けるのか、何を伝えるのか、どれくらい継続するのか、見た人に次に何をしてもらうのかで分解できます。これは『対象』『内容』『頻度』『行動導線』の切り口です。ロジカルシンキングでは、施策の成果が出ないときに、認知だけでなく行動までつながっているかを確認することが重要です。"],
["事業承継が進まない理由を分解せよ",["後継者がいない","経営者が決断できない","会社の魅力・収益性が低い","関係者調整が難しい"],"事業承継は後継者の有無だけでは説明できません。後継者候補、現経営者の意思決定、会社そのものの魅力、親族・従業員・金融機関など関係者調整の4つで見ます。これは関係者と条件を組み合わせた分解です。診断士的には、問題を一人の意思に還元せず、承継が成立するための条件を整理することが重要です。"],
["新メニュー開発で考えるべき要素を分解せよ",["顧客ニーズ","原価・利益率","調理オペレーション","見た目・話題性"],"新メニューは、おいしければよいというものではありません。顧客が求めているか、利益が出るか、現場で無理なく作れるか、見た目や話題性があるかで分けると実務的です。これは『売れる』『儲かる』『作れる』『広がる』という4つの観点です。ロジカルシンキングでは、商品開発を複数の評価軸に分けることで、感覚的な判断を避けられます。"],
["クレームが増えている原因を分解せよ",["商品・サービス不良","説明不足","期待値とのズレ","対応スピードの遅さ"],"クレームは、品質不良だけでなく、説明不足や期待値のズレ、発生後の対応遅れでも増えます。つまり『提供物』『事前説明』『顧客期待』『事後対応』の4つで分解できます。ロジックツリーでは、クレームを単なる怒りとして捉えず、顧客体験のどこで不満が生じたかを考えることが大切です。原因が違えば打ち手も変わります。"],
["班長として議論をまとめる手順を分解せよ",["目的を確認する","論点を分ける","意見を出して整理する","結論と根拠を決める"],"議論をまとめるときは、最初から正解を出そうとしないことが重要です。目的確認、論点分解、意見整理、結論化という順番で進めると、議論が迷子になりにくくなります。これはプロセス分解の典型です。養成課程のグループワークでは、班長がこの流れを口に出して示すだけで、メンバーの思考がそろいやすくなります。"],
["学習アプリを毎日続けるための工夫を分解せよ",["始めるハードルを下げる","成果を見える化する","習慣の時間を固定する","飽きない仕組みを入れる"],"継続の問題は、意思の強さだけでなく、行動設計として考えると整理できます。始めやすさ、成果実感、時間固定、変化や楽しさの4つで分けると、継続しやすい仕組みが見えます。ロジカルシンキングでは『続かない＝根性不足』と捉えず、行動が起きる条件に分解することが重要です。この切り方は勉強、運動、業務改善など多くの場面に応用できます。"],
["商談の成約率を上げる方法を分解せよ",["見込み客の質を上げる","課題ヒアリングを深める","提案内容を合わせる","クロージングを改善する"],"成約率は、最後の押しだけで決まるわけではありません。誰に提案しているか、相手の課題を理解できているか、提案が合っているか、最後に意思決定を促せているかで分解します。これは営業プロセスに沿った分解です。ロジックツリーを作るときは、結果に近い場面だけでなく、その前段階に原因がないかを見ることが大切です。"],
["店舗の人手不足を解消する方法を分解せよ",["採用を強化する","離職を減らす","業務を効率化する","外部資源を活用する"],"人手不足は、単に採用を増やすだけでは解決しません。入ってくる人を増やす、出ていく人を減らす、必要な作業量を減らす、外部委託やシステムなどを使う、という4つで考えます。これは『供給を増やす』『流出を減らす』『需要を減らす』『代替する』という構造です。ロジカルシンキングでは、問題を片側だけで見ず、需給の両面から分解することが重要です。"],
["新店舗の出店判断で確認すべき要素を分解せよ",["商圏・立地","ターゲット顧客","競合状況","収支採算"],"出店判断は、良さそうな場所かどうかだけでは危険です。商圏や立地、そこにいる顧客、競合の強さ、家賃や売上見込みを含む収支採算に分けて見る必要があります。これは外部環境と内部採算を組み合わせた分解です。診断士的には、感覚的な立地評価ではなく『売れる可能性』と『儲かる可能性』を分けて確認することが大切です。"],
["顧客アンケートを設計するときの項目を分解せよ",["顧客属性","利用状況","満足・不満点","今後の意向"],"アンケートは聞きたいことを並べるだけではなく、分析に使える構造にする必要があります。誰が答えているのか、どのように利用しているのか、何に満足・不満を感じているのか、今後も利用するかに分けます。これは『対象者』『行動』『評価』『将来意向』の分解です。ロジカルシンキングでは、集めた後に何を判断するのかを考えて項目を設計することが重要です。"],
["サービス品質を改善する方法を分解せよ",["品質基準を決める","スタッフ教育を行う","提供プロセスを整える","顧客の声を改善に反映する"],"サービス品質は、個人の頑張りだけでは安定しません。基準、教育、プロセス、顧客フィードバックの4つで仕組み化して考えます。基準があるから教育でき、プロセスがあるから再現でき、顧客の声があるから改善できます。ロジックツリーでは、抽象的な『品質を上げる』を、管理可能な要素に分解することが重要です。"],
["新規事業のアイデアを評価する観点を分解せよ",["市場性","顧客課題の強さ","自社の強みとの適合","収益性"],"新規事業アイデアは、面白さだけで判断すると失敗しやすくなります。市場があるか、顧客の課題が強いか、自社が勝てるか、収益が出るかの4つで評価します。これは『外部機会』『顧客価値』『自社適合』『経済性』の分解です。ロジカルシンキングでは、アイデアを好き嫌いで評価せず、複数の判断軸に分けることで冷静に比較できます。"],
["離職率が高い会社の原因を分解せよ",["仕事内容とのミスマッチ","人間関係の悪さ","評価・報酬への不満","成長機会の不足"],"離職率の高さは、給与だけで説明できません。仕事内容、人間関係、評価・報酬、成長機会の4つで見ると原因を整理しやすくなります。これは従業員体験を分解する考え方です。ロジックツリーでは、退職という結果の前に、日々の不満や将来不安がどこで発生しているかを考えることが重要です。"],
["チームの生産性を高める方法を分解せよ",["目標を明確にする","役割分担を整える","情報共有を改善する","無駄な作業を減らす"],"チームの生産性は、個人能力だけで決まりません。目標、役割、情報共有、業務効率の4つで考えると改善しやすくなります。目標が曖昧だと動きがそろわず、役割が曖昧だと重複や抜けが出ます。情報共有が悪いと手戻りが増え、無駄な作業が多いと成果に時間が使えません。ロジカルシンキングでは、個人ではなくチームの仕組みとして分解する視点が大切です。"],

var currentPage = 0;
var pageSize = 5;
var currentList = questions.slice();

function esc(s){
 return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function shuffle(a){
 var b=a.slice();
 for(var i=b.length-1;i>0;i--){
  var j=Math.floor(Math.random()*(i+1));
  var t=b[i]; b[i]=b[j]; b[j]=t;
 }
 return b;
}

function showPage(){
 var start=currentPage*pageSize;
 var end=start+pageSize;
 var list=currentList.slice(start,end);
 var html="";
 for(var i=0;i<list.length;i++){
  var q=list[i];
  var qNo=start+i+1;
  html+='<div class="card"><span class="badge">Q'+qNo+'</span><h2>'+esc(q[0])+'</h2>';
  html+='<button class="toggleBtn">分解例と解説を見る／閉じる</button>';
  html+='<div class="hiddenBlock"><div class="answer-title">一次分解例</div><ul>';
  for(var k=0;k<q[1].length;k++){html+='<li>'+esc(q[1][k])+'</li>';}
  html+='</ul><div class="explain-title">ロジカルシンキング解説</div>'+esc(q[2])+'</div></div>';
 }
 document.getElementById("app").innerHTML=html;
 attachToggle();
 updateNav();
 window.scrollTo(0,0);
}

function attachToggle(){
 var btns=document.getElementsByClassName("toggleBtn");
 for(var n=0;n<btns.length;n++){
  btns[n].onclick=function(){
   var x=this.nextElementSibling;
   if(x.style.display==="block"){x.style.display="none";}
   else{x.style.display="block";}
  };
 }
}

function updateNav(){
 var maxPage=Math.ceil(currentList.length/pageSize);
 var text="ページ "+(currentPage+1)+" / "+maxPage;
 document.getElementById("pageInfo").innerHTML=text;
 document.getElementById("pageInfo2").innerHTML=text;
 var isFirst=currentPage===0;
 var isLast=currentPage>=maxPage-1;
 document.getElementById("prevBtn").disabled=isFirst;
 document.getElementById("prevBtn2").disabled=isFirst;
 document.getElementById("nextBtn").disabled=isLast;
 document.getElementById("nextBtn2").disabled=isLast;
}

function nextPage(){
 var maxPage=Math.ceil(currentList.length/pageSize);
 if(currentPage<maxPage-1){currentPage++;showPage();}
}
function prevPage(){
 if(currentPage>0){currentPage--;showPage();}
}
function randomFive(){
 currentList=shuffle(questions).slice(0,5);
 currentPage=0;
 showPage();
}
function startAll(){
 currentList=questions.slice();
 currentPage=0;
 showPage();
}

document.getElementById("nextBtn").onclick=nextPage;
document.getElementById("nextBtn2").onclick=nextPage;
document.getElementById("prevBtn").onclick=prevPage;
document.getElementById("prevBtn2").onclick=prevPage;
document.getElementById("randomBtn").onclick=randomFive;
document.getElementById("allStartBtn").onclick=startAll;

startAll();
</script>
