<body>
<header>
<h1>MECE・ロジックツリー<br>瞬時分解トレーニング 50問版</h1>

<div class="box">

<b>ポイント：</b>一次分解はロジックツリーの最初の枝です。まず切り口を仮置きし、その後に詳細ツリー・別軸で修正する練習をしてください。
</div>

<script>
var questions = [{"theme": "美容室の売上を伸ばす方法を分解せよ", "answers": ["新規来店数を増やす", "再来店率を上げる", "客単価を上げる", "紹介・口コミを増やす"], "explanation": "売上改善のお題では、まず「売上＝客数×客単価」という数式を起点にします。ただし美容室の場合、客数の中身は新規と既存に分けた方が実務的です。新規来店数、再来店率、客単価の3つでほぼ主要因を押さえられます。さらに美容室は信頼産業なので、紹介・口コミを別の切り口として加えると、より現場で使える分解になります。ロジカルシンキングでは、いきなり施策を出す前に「どの変数を動かすのか」を明確にすることが大切です。", "tree": "美容室の売上を伸ばす\n├─ 新規来店数を増やす\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 再来店率を上げる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 客単価を上げる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 紹介・口コミを増やす\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・数値分解：数量×単価、売上−費用、分母・分子で見る\n・プロセス分解：認知→来店・訪問→購入→再購入"}, {"theme": "採用活動がうまくいかない原因を分解せよ", "answers": ["応募者が少ない", "求める人材と合わない", "選考プロセスが悪い", "入社条件に魅力がない"], "explanation": "採用の問題は、応募者数だけで考えると浅くなります。まず母集団形成、候補者とのマッチング、選考プロセス、条件・魅力の4つに分けると整理しやすいです。これは採用を「応募前→応募→選考→入社判断」という流れで見ている分解です。プロセスに沿って切ると、どこで詰まっているのかが見えます。MECEの訓練では、時間の流れや顧客行動の流れで切る方法を覚えると、瞬時に整理しやすくなります。", "tree": "採用活動がうまくいかない\n├─ 応募者が少ない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 求める人材と合わない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 選考プロセスが悪い\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 入社条件に魅力がない\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける"}, {"theme": "飲食店の客単価を上げる方法を分解せよ", "answers": ["高単価商品の追加", "セット販売", "追加注文の促進", "価格改定"], "explanation": "客単価は「一人が一回の来店でいくら使うか」です。そのため、単価の高い商品を用意する、複数商品を組み合わせる、追加注文を促す、価格そのものを見直す、という4つに分けられます。ここでは「商品構成」「買い方」「注文点数」「価格」という切り口です。ロジックツリーでは、客単価という抽象的な数字を、店側が操作できる具体的なレバーに分解することが重要です。", "tree": "飲食店の客単価を上げる\n├─ 高単価商品の追加\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ セット販売\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 追加注文の促進\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 価格改定\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・数値分解：数量×単価、売上−費用、分母・分子で見る\n・プロセス分解：認知→来店・訪問→購入→再購入"}, {"theme": "会議が長引く原因を分解せよ", "answers": ["目的が曖昧", "論点が多すぎる", "意思決定者が不在", "進行管理が弱い"], "explanation": "会議の問題は、人の話が長いという表面的な見方だけでは不十分です。目的、論点、意思決定、進行という4つに分けると、構造的に原因を把握できます。目的が曖昧だと話が広がり、論点が多すぎると収束せず、意思決定者がいないと結論が出ません。進行管理が弱いと時間内に着地できません。グループワークでも同じで、最初に目的と論点を定義するだけで議論の質が上がります。", "tree": "会議が長引く\n├─ 目的が曖昧\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 論点が多すぎる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 意思決定者が不在\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 進行管理が弱い\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・目的→論点→意見出し→整理→合意形成のプロセスで分ける\n・役割・時間・成果物・合意基準で分ける"}, {"theme": "新しいアプリが使われない理由を分解せよ", "answers": ["認知されていない", "使う理由が弱い", "操作が難しい", "継続する仕組みがない"], "explanation": "アプリ利用は、認知、初回利用、使いやすさ、継続という流れで考えます。このように利用者の行動プロセスに沿って分解すると、抜け漏れが少なくなります。使われない理由は、そもそも知られていないのか、価値が伝わっていないのか、使いにくいのか、継続する理由がないのかで対策が変わります。ロジカルシンキングでは、問題を一つの塊で捉えず、利用者が進むステップごとに切る発想が有効です。", "tree": "新しいアプリが使われない理由\n├─ 認知されていない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 使う理由が弱い\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 操作が難しい\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 継続する仕組みがない\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・外部環境・内部資源・実行力で分ける\n・プロセス、関係者、数値構造のどれで切れるかを検討する"}, {"theme": "売れる営業担当者の特徴を分解せよ", "answers": ["顧客理解力", "提案力", "関係構築力", "行動量"], "explanation": "営業力は『話がうまい』だけでは説明できません。顧客の課題を理解する力、解決策として提案する力、信頼関係を築く力、十分な接点を作る行動量の4つで見ると整理しやすくなります。これは営業成果を生む要素を、能力面と行動面に分けた考え方です。ロジックツリーでは、人物評価のような抽象テーマでも、成果に結びつく要素に分解すると議論しやすくなります。", "tree": "売れる営業担当者の特徴\n├─ 顧客理解力\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 提案力\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 関係構築力\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 行動量\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける"}, {"theme": "ECサイトの購入率が低い原因を分解せよ", "answers": ["商品魅力が伝わらない", "価格に納得できない", "購入手続きが面倒", "信頼感が不足している"], "explanation": "ECサイトの購入率は、訪問者が購入に至るまでの心理と行動で分解します。商品が欲しいと思えない、価格に納得できない、購入手続きで離脱する、サイトや会社を信用できない、という4つです。これは顧客の購買プロセスに沿った分解です。ロジカルシンキングでは、数値低下の原因を『顧客がどこで止まっているか』に置き換えると、改善策が具体化しやすくなります。", "tree": "ECサイトの購入率が低い\n├─ 商品魅力が伝わらない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 価格に納得できない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 購入手続きが面倒\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 信頼感が不足している\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・数値分解：数量×単価、売上−費用、分母・分子で見る\n・プロセス分解：認知→来店・訪問→購入→再購入"}, {"theme": "地域の空き家が増える原因を分解せよ", "answers": ["所有者側の事情", "需要不足", "改修コスト", "流通・情報不足"], "explanation": "空き家問題は、建物そのものだけでなく、所有者、利用希望者、費用、情報流通の問題が絡みます。所有者が処分を決められない、買い手や借り手が少ない、改修費が高い、物件情報が流通していない、という4分類です。社会課題では、関係者ごとに分けると整理しやすいです。MECEを意識するなら『誰の問題か』『どの制約か』を考えると、一次分解が作りやすくなります。", "tree": "地域の空き家が増える\n├─ 所有者側の事情\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 需要不足\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 改修コスト\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 流通・情報不足\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・外部環境・内部資源・実行力で分ける\n・プロセス、関係者、数値構造のどれで切れるかを検討する"}, {"theme": "社員教育が成果につながらない原因を分解せよ", "answers": ["教育内容が実務とズレている", "学ぶ時間がない", "上司の支援が弱い", "成果確認がない"], "explanation": "教育課題は、研修の中身だけでなく、学習環境、現場支援、効果測定まで見る必要があります。教育内容が実務に合っていなければ使われず、時間がなければ学べません。上司の支援がなければ現場で実践されず、成果確認がなければ改善できません。ロジカルシンキングでは、施策そのものだけでなく『実行される条件』まで分解することが大切です。", "tree": "社員教育が成果につながらない\n├─ 教育内容が実務とズレている\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 学ぶ時間がない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 上司の支援が弱い\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 成果確認がない\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける"}, {"theme": "観光地の満足度を高める要素を分解せよ", "answers": ["観光資源の魅力", "交通・アクセス", "飲食・宿泊の質", "接客・情報提供"], "explanation": "観光地の満足度は、観光資源だけでは決まりません。行きやすさ、滞在中の飲食や宿泊、現地での案内や接客も含めた総合体験で決まります。これは顧客体験を『目的物』『移動』『滞在』『人的・情報サービス』に分けた考え方です。ロジックツリーでは、顧客が体験する一連の流れを思い浮かべると、抜け漏れの少ない分解ができます。", "tree": "観光地の満足度を高める要素\n├─ 観光資源の魅力\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 交通・アクセス\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 飲食・宿泊の質\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 接客・情報提供\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・3C分析：顧客・自社・競合\n・4P分析：商品・価格・販路・販促\n・STP：誰に・どの価値で選ばれるか"}, {"theme": "小規模スーパーが大手に対抗する方法を分解せよ", "answers": ["品揃えの差別化", "地域密着サービス", "鮮度・品質の強化", "固定客づくり"], "explanation": "小規模スーパーは、大手と同じ土俵で価格や品揃えの量を競うと不利になりがちです。そこで、地域に合った品揃え、顔の見えるサービス、鮮度や品質、固定客との関係性に分けて考えます。これは競争戦略として『大手がやりにくいこと』に注目した分解です。ロジカルシンキングでは、単に打ち手を並べるのではなく、競争優位につながる軸で切ることが重要です。", "tree": "小規模スーパーが大手に対抗する\n├─ 品揃えの差別化\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 地域密着サービス\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 鮮度・品質の強化\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 固定客づくり\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・商圏分析：人口・競合・導線・購買力\n・4P＋店舗オペレーションで分ける"}, {"theme": "価格を上げても顧客離れを防ぐ方法を分解せよ", "answers": ["価値を明確に伝える", "サービス品質を上げる", "既存顧客へ丁寧に説明する", "価格帯を複数用意する"], "explanation": "値上げは価格だけの問題ではなく、顧客の納得感の問題です。価値を伝える、品質を高める、既存顧客に説明する、複数価格帯を用意するという4つで分解できます。これは『価値』『品質』『コミュニケーション』『選択肢』の切り口です。ロジカルシンキングでは、顧客離れという結果を、顧客心理の不満や不安に分解して考えることが大切です。", "tree": "価格を上げても顧客離れを防ぐ\n├─ 価値を明確に伝える\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ サービス品質を上げる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 既存顧客へ丁寧に説明する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 価格帯を複数用意する\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・3C分析：顧客・自社・競合\n・4P分析：商品・価格・販路・販促\n・STP：誰に・どの価値で選ばれるか"}, {"theme": "起業直後に資金繰りが苦しくなる原因を分解せよ", "answers": ["売上の立ち上がり遅れ", "初期投資の過大", "固定費の負担", "入金と支払いのズレ"], "explanation": "資金繰りは利益とは別に、現金の出入りで考える必要があります。売上が遅い、初期投資が大きい、毎月の固定費が重い、入金より支払いが先に来る、という4つで整理できます。これは『収入』『初期支出』『継続支出』『タイミング』の分解です。ロジックツリーでは、会計上の利益と現金収支を混同しないように、何を改善したいのかを明確にすることが重要です。", "tree": "起業直後に資金繰りが苦しくなる\n├─ 売上の立ち上がり遅れ\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 初期投資の過大\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 固定費の負担\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 入金と支払いのズレ\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・数値分解：数量×単価、売上−費用、分母・分子で見る\n・プロセス分解：認知→来店・訪問→購入→再購入"}, {"theme": "ブランド力を高める方法を分解せよ", "answers": ["コンセプトを明確にする", "顧客体験を統一する", "発信を継続する", "口コミ・実績を積む"], "explanation": "ブランドはロゴや名前だけではありません。何者なのかを示すコンセプト、実際に感じる顧客体験、継続的な発信、信頼を生む口コミや実績によって形成されます。これは『定義する』『体験させる』『伝える』『証明する』という流れの分解です。抽象的なテーマでは、ブランドを構成する要素に分けると、議論が感覚論になりにくくなります。", "tree": "ブランド力を高める\n├─ コンセプトを明確にする\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 顧客体験を統一する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 発信を継続する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 口コミ・実績を積む\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・3C分析：顧客・自社・競合\n・4P分析：商品・価格・販路・販促\n・STP：誰に・どの価値で選ばれるか"}, {"theme": "店舗スタッフの接客品質がばらつく原因を分解せよ", "answers": ["基準が明確でない", "教育が不足している", "現場確認が弱い", "評価・フィードバックがない"], "explanation": "接客品質のばらつきは、個人のやる気だけで考えると改善が難しくなります。基準、教育、確認、評価の4つに分けると、仕組みとして原因を把握できます。基準がなければ人によって判断が変わり、教育がなければ再現できず、確認とフィードバックがなければ改善されません。ロジカルシンキングでは、人の問題に見えるものを、仕組みの問題として分解する視点が大切です。", "tree": "店舗スタッフの接客品質がばらつく\n├─ 基準が明確でない\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 教育が不足している\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 現場確認が弱い\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 評価・フィードバックがない\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける\n・商圏分析：人口・競合・導線・購買力\n・4P＋店舗オペレーションで分ける"}, {"theme": "SNS投稿が成果につながらない理由を分解せよ", "answers": ["ターゲットが曖昧", "内容が顧客ニーズとズレている", "投稿頻度が不足", "導線がない"], "explanation": "SNSの成果は投稿数だけでは決まりません。誰に向けるのか、何を伝えるのか、どれくらい継続するのか、見た人に次に何をしてもらうのかで分解できます。これは『対象』『内容』『頻度』『行動導線』の切り口です。ロジカルシンキングでは、施策の成果が出ないときに、認知だけでなく行動までつながっているかを確認することが重要です。", "tree": "SNS投稿が成果につながらない理由\n├─ ターゲットが曖昧\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 内容が顧客ニーズとズレている\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  "・外部環境・内部資源・実行力で分ける\n・プロセス、関係者、数値構造のどれで切れるかを検討する"}, {"theme": "班長として議論をまとめる手順を分解せよ", "answers": ["目的を確認する", "論点を分ける", "意見を出して整理する", "結論と根拠を決める"], "explanation": "議論をまとめるときは、最初から正解を出そうとしないことが重要です。目的確認、論点分解、意見整理、結論化という順番で進めると、議論が迷子になりにくくなります。これはプロセス分解の典型です。養成課程のグループワークでは、班長がこの流れを口に出して示すだけで、メンバーの思考がそろいやすくなります。", "tree": "班長として議論をまとめる手順\n├─ 目的を確認する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 論点を分ける\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 意見を出して整理する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 結論と根拠を決める\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・目的→論点→意見出し→整理→合意形成のプロセスで分ける\n・役割・時間・成果物・合意基準で分ける"}, {"theme": "学習アプリを毎日続けるための工夫を分解せよ", "answers": ["始めるハードルを下げる", "成果を見える化する", "習慣の時間を固定する", "飽きない仕組みを入れる"], "explanation": "継続の問題は、意思の強さだけでなく、行動設計として考えると整理できます。始めやすさ、成果実感、時間固定、変化や楽しさの4つで分けると、継続しやすい仕組みが見えます。ロジカルシンキングでは『続かない＝根性不足』と捉えず、行動が起きる条件に分解することが重要です。この切り方は勉強、運動、業務改善など多くの場面に応用できます。", "tree": "学習アプリを毎日続けるための工夫\n├─ 始めるハードルを下げる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 成果を見える化する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 習慣の時間を固定する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 飽きない仕組みを入れる\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・外部環境・内部資源・実行力で分ける\n・プロセス、関係者、数値構造のどれで切れるかを検討する"}, {"theme": "商談の成約率を上げる方法を分解せよ", "answers": ["見込み客の質を上げる", "課題ヒアリングを深める", "提案内容を合わせる", "クロージングを改善する"], "explanation": "成約率は、最後の押しだけで決まるわけではありません。誰に提案しているか、相手の課題を理解できているか、提案が合っているか、最後に意思決定を促せているかで分解します。これは営業プロセスに沿った分解です。ロジックツリーを作るときは、結果に近い場面だけでなく、その前段階に原因がないかを見ることが大切です。", "tree": "商談の成約率を上げる\n├─ 見込み客の質を上げる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 課題ヒアリングを深める\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 提案内容を合わせる\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ クロージングを改善する\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・数値分解：数量×単価、売上−費用、分母・分子で見る\n・プロセス分解：認知→来店・訪問→購入→再購入"}, {"theme": "店舗の人手不足を解消する方法を分解せよ", "answers": ["採用を強化する", "離職を減らす", "業務を効率化する", "外部資源を活用する"], "explanation": "人手不足は、単に採用を増やすだけでは解決しません。入ってくる人を増やす、出ていく人を減らす、必要な作業量を減らす、外部委託やシステムなどを使う、という4つで考えます。これは『供給を増やす』『流出を減らす』『需要を減らす』『代替する』という構造です。ロジカルシンキングでは、問題を片側だけで見ず、需給の両面から分解することが重要です。", "tree": "店舗の人手不足を解消する\n├─ 採用を強化する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 離職を減らす\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 業務を効率化する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 外部資源を活用する\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける\n・商圏分析：人口・競合・導線・購買力\n・4P＋店舗オペレーションで分ける"}, {"theme": "新店舗の出店判断で確認すべき要素を分解せよ", "answers": ["商圏・立地", "ターゲット顧客", "競合状況", "収支採算"], "explanation": "出店判断は、良さそうな場所かどうかだけでは危険です。商圏や立地、そこにいる顧客、競合の強さ、家賃や売上見込みを含む収支採算に分けて見る必要があります。これは外部環境と内部採算を組み合わせた分解です。診断士的には、感覚的な立地評価ではなく『売れる可能性』と『儲かる可能性』を分けて確認することが大切です。", "tree": "新店舗の出店判断で確認すべき要素\n├─ 商圏・立地\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ ターゲット顧客\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 競合状況\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 収支採算\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・商圏分析：人口・競合・導線・購買力\n・4P＋店舗オペレーションで分ける"}, {"theme": "顧客アンケートを設計するときの項目を分解せよ", "answers": ["顧客属性", "利用状況", "満足・不満点", "今後の意向"], "explanation": "アンケートは聞きたいことを並べるだけではなく、分析に使える構造にする必要があります。誰が答えているのか、どのように利用しているのか、何に満足・不満を感じているのか、今後も利用するかに分けます。これは『対象者』『行動』『評価』『将来意向』の分解です。ロジカルシンキングでは、集めた後に何を判断するのかを考えて項目を設計することが重要です。", "tree": "顧客アンケートを設計するときの項目\n├─ 顧客属性\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 利用状況\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 満足・不満点\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 今後の意向\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・3C分析：顧客・自社・競合\n・4P分析：商品・価格・販路・販促\n・STP：誰に・どの価値で選ばれるか"}, {"theme": "サービス品質を改善する方法を分解せよ", "answers": ["品質基準を決める", "スタッフ教育を行う", "提供プロセスを整える", "顧客の声を改善に反映する"], "explanation": "サービス品質は、個人の頑張りだけでは安定しません。基準、教育、プロセス、顧客フィードバックの4つで仕組み化して考えます。基準があるから教育でき、プロセスがあるから再現でき、顧客の声があるから改善できます。ロジックツリーでは、抽象的な『品質を上げる』を、管理可能な要素に分解することが重要です。", "tree": "サービス品質を改善する\n├─ 品質基準を決める\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ スタッフ教育を行う\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 提供プロセスを整える\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 顧客の声を改善に反映する\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・外部環境・内部資源・実行力で分ける\n・プロセス、関係者、数値構造のどれで切れるかを検討する"}, {"theme": "新規事業のアイデアを評価する観点を分解せよ", "answers": ["市場性", "顧客課題の強さ", "自社の強みとの適合", "収益性"], "explanation": "新規事業アイデアは、面白さだけで判断すると失敗しやすくなります。市場があるか、顧客の課題が強いか、自社が勝てるか、収益が出るかの4つで評価します。これは『外部機会』『顧客価値』『自社適合』『経済性』の分解です。ロジカルシンキングでは、アイデアを好き嫌いで評価せず、複数の判断軸に分けることで冷静に比較できます。", "tree": "新規事業のアイデアを評価する観点\n├─ 市場性\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 顧客課題の強さ\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 自社の強みとの適合\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 収益性\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・外部環境・内部資源・実行力で分ける\n・プロセス、関係者、数値構造のどれで切れるかを検討する"}, {"theme": "離職率が高い会社の原因を分解せよ", "answers": ["仕事内容とのミスマッチ", "人間関係の悪さ", "評価・報酬への不満", "成長機会の不足"], "explanation": "離職率の高さは、給与だけで説明できません。仕事内容、人間関係、評価・報酬、成長機会の4つで見ると原因を整理しやすくなります。これは従業員体験を分解する考え方です。ロジックツリーでは、退職という結果の前に、日々の不満や将来不安がどこで発生しているかを考えることが重要です。", "tree": "離職率が高い会社の\n├─ 仕事内容とのミスマッチ\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 人間関係の悪さ\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 評価・報酬への不満\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 成長機会の不足\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける"}, {"theme": "チームの生産性を高める方法を分解せよ", "answers": ["目標を明確にする", "役割分担を整える", "情報共有を改善する", "無駄な作業を減らす"], "explanation": "チームの生産性は、個人能力だけで決まりません。目標、役割、情報共有、業務効率の4つで考えると改善しやすくなります。目標が曖昧だと動きがそろわず、役割が曖昧だと重複や抜けが出ます。情報共有が悪いと手戻りが増え、無駄な作業が多いと成果に時間が使えません。ロジカルシンキングでは、個人ではなくチームの仕組みとして分解する視点が大切です。", "tree": "チームの生産性を高める\n├─ 目標を明確にする\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 役割分担を整える\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ 情報共有を改善する\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 無駄な作業を減らす\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・人・仕組み・環境で分ける\n・Will/Can/Must、またはスキル・マインド・行動で分ける"}, {"theme": "地域ブランドを作るために必要な要素を分解せよ", "answers": ["地域資源の発掘", "ターゲット設定", "ストーリー化", "販路・発信の設計"], "explanation": "地域ブランドは、名産品を並べるだけでは成立しません。地域資源を見つけ、誰に届けるかを決め、魅力をストーリー化し、販路や発信方法を設計する必要があります。これは『素材』『顧客』『意味づけ』『届け方』の分解です。ロジカルシンキングでは、地域の魅力という曖昧なものを、商品化・発信可能な要素に分けることが重要です。", "tree": "地域ブランドを作るために必要な要素\n├─ 地域資源の発掘\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ ターゲット設定\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n├─ ストーリー化\n│  ├─ 現状を確認する\n│  ├─ 原因・制約を深掘りする\n│  └─ 打ち手・改善策につなげる\n└─ 販路・発信の設計\n   ├─ 現状を確認する\n   ├─ 原因・制約を深掘りする\n   └─ 打ち手・改善策につなげる", "alt": "・3C分析：顧客・自社・競合\n・4P分析：商品・価格・販路・販促\n・STP：誰に・どの価値で選ばれるか"}, {"theme": "中小企業の営業利益率が低い原因を分解せよ", "answers": ["売上総利益率が低い", "販管費が重い", "販売数量が不足している", "価格設定が弱い"], "explanation": "診断士の演習では、利益率を感覚で語らず、損益構造で分解することが大切です。営業利益率は、売上から原価と販管費を差し引いた結果なので、まず粗利の問題か、販管費の問題か、売上規模の問題かを切り分けます。さらに、売価が低いのか、原価が高いのか、数量が不足して固定費を吸収できていないのかを見ます。一次分解で損益計算書の構造を使えると、打ち手が値上げ・原価低減・固定費見直し・販売数量増加のどこに効くのかが明確になります。", "tree": "営業利益率が低い\n├─ 売上総利益率が低い\n│  ├─ 売価が低い\n│  ├─ 原価率が高い\n│  └─ 高粗利商品の構成比が低い\n├─ 販管費が重い\n│  ├─ 人件費が高い\n│  ├─ 家賃・固定費が高い\n│  └─ 広告宣伝費の効率が悪い\n├─ 販売数量が不足している\n│  ├─ 客数が少ない\n│  ├─ 成約率が低い\n│  └─ リピートが少ない\n└─ 価格設定が弱い\n   ├─ 値上げできていない\n   ├─ 価値訴求が弱い\n   └─ 競合価格に引きずられている", "alt": "・損益分岐点分析：固定費、変動費、限界利益率で見る\n・商品別採算：高粗利商品と低粗利商品の構成比で見る\n・バリューチェーン：どの活動で利益を失っているかを見る"}, {"theme": "小売店で売場の回遊性が悪い原因を分解せよ", "answers": ["動線設計が悪い", "売場分類が分かりにくい", "陳列に魅力がない", "店内情報が不足している"], "explanation": "小売の現場改善では、顧客が店内でどう動くかをプロセスで見ることが重要です。回遊性が悪いとは、顧客が店内を十分に歩かず、商品接触機会が少ない状態です。原因は、入口から奥へ向かう導線、商品カテゴリーの分かりやすさ、目に留まる陳列、案内表示やPOPなどに分けられます。班で議論するときは、売場を『顧客が歩く体験』として見える化すると、単なる感想ではなく具体的な改善案につながります。", "tree": "売場の回遊性が悪い\n├─ 動線設計が悪い\n│  ├─ 入口から奥へ誘導できていない\n│  ├─ 通路が狭い・詰まっている\n│  └─ 主力売場が見えにくい\n├─ 売場分類が分かりにくい\n│  ├─ カテゴリー表示が弱い\n│  ├─ 関連商品が離れている\n│  └─ 顧客の購買目的と棚割が合わない\n├─ 陳列に魅力がない\n│  ├─ 季節感が弱い\n│  ├─ 重点商品が目立たない\n│  └─ 比較・選択しづらい\n└─ 店内情報が不足している\n   ├─ POPが少ない\n   ├─ 価格・特徴が伝わらない\n   └─ スタッフ誘導がない", "alt": "・AIDMA/AISAS：注意→興味→購買行動で見る\n・4PのPlace：売場・導線・陳列として見る\n・顧客行動観察：入店前、入店直後、店内、レジ前で分ける"}, {"theme": "製造業で生産性を高める方法を分解せよ", "answers": ["ボトルネック工程を改善する", "段取り時間を短縮する", "不良・手戻りを減らす", "人員配置を最適化する"], "explanation": "製造業の生産性は、単に作業者を急がせることでは上がりません。工程全体の流れを見て、どこが詰まっているのか、どこで待ちや手戻りが発生しているのかを分解します。特にボトルネック工程、段取り替え、不良、配置の4つは、生産現場で議論しやすい切り口です。ロジカルシンキングでは、全体最適と部分最適を区別することが重要です。一部の工程だけ速くしても、制約工程が残れば全体の生産性は上がりません。", "tree": "生産性を高める\n├─ ボトルネック工程を改善する\n│  ├─ 処理能力を上げる\n│  ├─ 待ち時間を減らす\n│  └─ 工程順序を見直す\n├─ 段取り時間を短縮する\n│  ├─ 外段取り化する\n│  ├─ 治具・工具を整備する\n│  └─ 作業標準を作る\n├─ 不良・手戻りを減らす\n│  ├─ 品質基準を明確化する\n│  ├─ 検査ポイントを設ける\n│  └─ 原因を再発防止する\n└─ 人員配置を最適化する\n   ├─ 多能工化する\n   ├─ 繁閑に応じて配置する\n   └─ 教育計画を整える", "alt": "・QCD：品質、コスト、納期で見る\n・ECRS：排除、結合、交換、簡素化で改善する\n・TOC：制約工程を特定して改善する"}, {"theme": "物流コストが上昇している原因を分解せよ", "answers": ["配送頻度が多い", "積載効率が低い", "保管コストが高い", "委託単価が上がっている"], "explanation": "物流コストは、配送だけでなく保管や荷役も含めて考える必要があります。配送頻度が多い、トラックの積載効率が低い、倉庫保管が非効率、外部委託単価が上昇している、という切り口で分けると、改善対象が明確になります。診断士の演習では、物流を『運ぶ』だけでなく、『持つ・動かす・届ける』の流れで捉えることが重要です。数値としては、配送単価、出荷件数、積載率、在庫日数などに落とし込めます。", "tree": "物流コストが上昇\n├─ 配送頻度が多い\n│  ├─ 小口配送が多い\n│  ├─ 緊急配送が多い\n│  └─ 配送計画が弱い\n├─ 積載効率が低い\n│  ├─ 混載できていない\n│  ├─ ルート設計が悪い\n│  └─ 荷姿が非効率\n├─ 保管コストが高い\n│  ├─ 在庫量が多い\n│  ├─ 倉庫スペースが過大\n│  └─ 入出庫作業が多い\n└─ 委託単価が上がっている\n   ├─ 運賃上昇\n   ├─ 人手不足による単価上昇\n   └─ 契約条件の見直し不足", "alt": "・物流5機能：輸送、保管、荷役、包装、流通加工で見る\n・在庫回転率：在庫量と出荷量の関係で見る\n・プロセス分解：受注→出荷→配送→納品で見る"}, {"theme": "IT導入が現場に定着しない理由を分解せよ", "answers": ["現場課題と合っていない", "操作が難しい", "教育・支援が不足している", "既存業務が変わっていない"], "explanation": "IT導入の失敗は、システム機能だけの問題ではありません。現場課題と合っているか、使いやすいか、教育やサポートがあるか、業務プロセス自体が見直されているかを分けて考える必要があります。ロジカルシンキングでは、ITを『導入物』ではなく『業務変革の手段』として見ることが大切です。現場に定着しない場合、システム・人・業務・マネジメントのどこに問題があるかを切り分けると、改善策が具体化します。", "tree": "IT導入が定着しない\n├─ 現場課題と合っていない\n│  ├─ 要件定義が浅い\n│  ├─ 現場ヒアリング不足\n│  └─ 導入目的が曖昧\n├─ 操作が難しい\n│  ├─ 画面が複雑\n│  ├─ 入力項目が多い\n│  └─ 既存業務より手間が増える\n├─ 教育・支援が不足\n│  ├─ 研修が一度きり\n│  ├─ 質問先がない\n│  └─ マニュアルが不十分\n└─ 既存業務が変わっていない\n   ├─ 紙業務が残る\n   ├─ 二重入力が発生する\n   └─ 権限・ルールが未整備", "alt": "・人・業務・システムで分ける\n・ユーザージャーニー：導入前→初回利用→日常利用→改善要望\n・DX推進：目的、業務改革、データ活用、組織文化で見る"}, {"theme": "班長としてグループワークの質を高める方法を分解せよ", "answers": ["ゴールを明確にする", "論点を分解する", "発言機会を設計する", "合意形成の基準を作る"], "explanation": "班長の役割は、最も良い答えを一人で出すことではなく、班全体の思考を整理して成果物に導くことです。まずゴールを明確にし、何を決める議論なのかをそろえます。次に論点を分解し、意見が出る場所を作ります。さらに、声の大きい人だけでなく全員が参加できるように発言機会を設計します。最後に、どの案を採用するかの基準を持つことで、納得感のある合意形成ができます。", "tree": "グループワークの質を高める\n├─ ゴールを明確にする\n│  ├─ 設問を確認する\n│  ├─ 成果物を定義する\n│  └─ 時間配分を決める\n├─ 論点を分解する\n│  ├─ 現状分析\n│  ├─ 原因分析\n│  └─ 打ち手検討\n├─ 発言機会を設計する\n│  ├─ 付箋で書く\n│  ├─ 順番に一言出す\n│  └─ 少数意見を拾う\n└─ 合意形成の基準を作る\n   ├─ 効果\n   ├─ 実行可能性\n   └─ 根拠の強さ", "alt": "・会議プロセス：目的→発散→収束→決定\n・ファシリテーション：問い、見える化、構造化、合意形成\n・評価軸：効果、実行可能性、納得感、時間制約"}, {"theme": "店舗の人時生産性を高める方法を分解せよ", "answers": ["売上を増やす", "作業時間を減らす", "人員配置を最適化する", "高付加価値業務に集中する"], "explanation": "人時生産性は、従業員1時間あたりの粗利益や売上で見る指標です。したがって、分子である売上・粗利を増やす方向と、分母である投入時間を減らす方向に分解できます。さらに、単に人を減らすのではなく、繁忙時間に合わせた配置や、接客・提案など付加価値の高い業務に時間を振り向ける視点が重要です。数値指標を使う問題では、分母・分子に分ける癖をつけると、一次分解が安定します。", "tree": "人時生産性を高める\n├─ 売上を増やす\n│  ├─ 客数を増やす\n│  ├─ 客単価を上げる\n│  └─ 高粗利商品を売る\n├─ 作業時間を減らす\n│  ├─ 補充作業を効率化する\n│  ├─ レジ待ちを減らす\n│  └─ 二重作業をなくす\n├─ 人員配置を最適化する\n│  ├─ 繁閑に合わせる\n│  ├─ シフトを見直す\n│  └─ 多能工化する\n└─ 高付加価値業務に集中する\n   ├─ 接客提案\n   ├─ 売場改善\n   └─ 顧客対応", "alt": "・分母分子分解：粗利÷総労働時間\n・ECRS：不要作業をなくす・まとめる・順番を変える・簡単にする\n・業務棚卸：定型業務、接客業務、管理業務で分ける"}, {"theme": "在庫回転率が悪い原因を分解せよ", "answers": ["販売予測が外れている", "発注量が多すぎる", "死に筋商品が残っている", "販促・値下げ判断が遅い"], "explanation": "在庫回転率は、在庫がどれだけ効率よく売上に変わっているかを見る指標です。悪化の原因は、需要予測、発注、商品構成、販売処分の4つに分けられます。売れない商品を持ち続けると資金が寝てしまい、保管コストや廃棄リスクも増えます。ロジカルシンキングでは、在庫を『結果』として見るのではなく、予測→発注→販売→処分という流れで捉えると、どこで詰まっているかが分かります。", "tree": "在庫回転率が悪い\n├─ 販売予測が外れている\n│  ├─ 季節変動を読めていない\n│  ├─ 顧客ニーズを把握できていない\n│  └─ 過去データを活用していない\n├─ 発注量が多すぎる\n│  ├─ 安全在庫を持ちすぎる\n│  ├─ ロットが大きい\n│  └─ 担当者判断に依存している\n├─ 死に筋商品が残る\n│  ├─ 商品改廃が遅い\n│  ├─ 棚替えが少ない\n│  └─ 売場で目立たない\n└─ 販促・値下げ判断が遅い\n   ├─ 処分基準がない\n   ├─ 値下げ権限が曖昧\n   └─ 販促計画が弱い", "alt": "・ABC分析：重点管理商品と低回転商品で分ける\n・需要予測→発注→販売→処分のプロセスで見る\n・キャッシュフロー視点：在庫は資金の固定化として見る"}, {"theme": "商圏分析で確認すべき項目を分解せよ", "answers": ["人口・世帯特性", "競合状況", "来店導線", "購買力・需要"], "explanation": "商圏分析は、店舗やサービスがどの地域から顧客を獲得できるかを見る分析です。人口や世帯構成だけでなく、競合、駅・道路・駐車場などの導線、所得や生活スタイルから見た購買力を確認します。一次分解としては『誰がいるか』『競争はどうか』『来やすいか』『買う力・需要があるか』で整理すると分かりやすいです。出店判断や店舗改善の演習では、この切り口を持っていると議論が安定します。", "tree": "商圏分析で確認する項目\n├─ 人口・世帯特性\n│  ├─ 年齢構成\n│  ├─ 世帯人数\n│  └─ 昼夜間人口\n├─ 競合状況\n│  ├─ 競合店舗数\n│  ├─ 競合の強み\n│  └─ 価格・品揃え\n├─ 来店導線\n│  ├─ 駅・道路\n│  ├─ 駐車場・駐輪場\n│  └─ 視認性\n└─ 購買力・需要\n   ├─ 所得水準\n   ├─ 生活スタイル\n   └─ 商品カテゴリー需要", "alt": "・3C：顧客、競合、自社で見る\n・GIS的視点：距離、移動時間、人口密度で見る\n・小売の4P：立地をPlaceとして見る"}, {"theme": "診断報告書の説得力が弱い原因を分解せよ", "answers": ["現状分析が浅い", "原因と提案がつながっていない", "根拠データが弱い", "実行計画が曖昧"], "explanation": "診断報告書は、きれいな文章よりも論理のつながりが重要です。現状分析が浅いと課題設定が弱くなり、原因と提案がつながっていないと説得力が落ちます。また、データやヒアリング根拠が弱いと主観的に見えます。さらに、実行計画が曖昧だと提案で終わってしまいます。ロジカルシンキングでは、現状→原因→課題→提案→実行計画の流れを一貫させることが重要です。", "tree": "診断報告書の説得力が弱い\n├─ 現状分析が浅い\n│  ├─ 事実が少ない\n│  ├─ 数値が不足\n│  └─ 比較対象がない\n├─ 原因と提案がつながらない\n│  ├─ 課題設定が曖昧\n│  ├─ 打ち手が思いつき\n│  └─ 優先順位がない\n├─ 根拠データが弱い\n│  ├─ ヒアリング不足\n│  ├─ 財務・業務データ不足\n│  └─ 外部環境情報不足\n└─ 実行計画が曖昧\n   ├─ 誰がやるか不明\n   ├─ 期限がない\n   └─ 効果測定がない", "alt": "・ピラミッドストラクチャー：結論→根拠→詳細で構成する\n・課題解決プロセス：現状、原因、課題、施策、効果\n・SMART：具体性、測定可能性、達成可能性、関連性、期限"}, {"theme": "財務分析でまず確認すべき観点を分解せよ", "answers": ["収益性", "安全性", "効率性", "成長性"], "explanation": "財務分析では、数字を一つずつ見るのではなく、何を判断したいかで観点を分けます。収益性は利益を稼ぐ力、安全性は倒産しにくさ、効率性は資産をうまく使えているか、成長性は売上や利益が伸びているかを見ます。この4つを一次分解として持っておくと、財務諸表を読む順番が安定します。診断士の演習では、数値の羅列ではなく、経営課題に結びつく解釈が求められます。", "tree": "財務分析で確認すべき観点\n├─ 収益性\n│  ├─ 売上総利益率\n│  ├─ 営業利益率\n│  └─ ROA・ROE\n├─ 安全性\n│  ├─ 自己資本比率\n│  ├─ 流動比率\n│  └─ 借入依存度\n├─ 効率性\n│  ├─ 棚卸資産回転率\n│  ├─ 売上債権回転率\n│  └─ 総資産回転率\n└─ 成長性\n   ├─ 売上高成長率\n   ├─ 利益成長率\n   └─ 顧客・市場の拡大", "alt": "・P/L、B/S、C/Fで分ける\n・短期支払能力、長期安定性、収益力で分ける\n・同業比較、時系列比較、計画比で見る"}, {"theme": "原価低減を進める方法を分解せよ", "answers": ["材料費を下げる", "加工工数を減らす", "不良ロスを減らす", "設計・仕様を見直す"], "explanation": "原価低減は、仕入先に値下げを求めるだけでは不十分です。材料費、加工工数、不良ロス、設計・仕様の4つで考えると、より本質的な改善が見えます。特に製造業では、製品設計段階で原価の多くが決まることもあるため、現場改善だけでなく設計変更や標準化も重要です。ロジカルシンキングでは、原価を構成要素に分解し、どの要素に手を打つかを明確にすることが大切です。", "tree": "原価低減を進める\n├─ 材料費を下げる\n│  ├─ 仕入単価を見直す\n│  ├─ 代替材料を検討する\n│  └─ 歩留まりを改善する\n├─ 加工工数を減らす\n│  ├─ 作業手順を標準化する\n│  ├─ 自動化する\n│  └─ 段取りを短縮する\n├─ 不良ロスを減らす\n│  ├─ 原因を特定する\n│  ├─ 検査を強化する\n│  └─ 再発防止する\n└─ 設計・仕様を見直す\n   ├─ 部品点数を減らす\n   ├─ 共通部品化する\n   └─ 過剰品質を見直す", "alt": "・VE：機能とコストの関係で見る\n・QCD：品質を落とさずコストを下げる\n・ECRS：工程改善の切り口として使う"}, {"theme": "補助金申請支援で確認すべき観点を分解せよ", "answers": ["事業目的との整合性", "投資内容の妥当性", "実現可能性", "効果測定"], "explanation": "補助金申請支援では、単に書類を整えるだけでなく、事業として筋が通っているかを確認する必要があります。目的と制度趣旨が合っているか、投資内容が課題解決につながるか、実行体制や資金計画が現実的か、成果をどう測るかに分けて考えます。診断士としては、採択されやすさだけでなく、事業者にとって本当に意味のある投資かを見る姿勢が重要です。", "tree": "補助金申請支援で確認する観点\n├─ 事業目的との整合性\n│  ├─ 経営課題と合う\n│  ├─ 制度目的と合う\n│  └─ 将来ビジョンと合う\n├─ 投資内容の妥当性\n│  ├─ 課題解決に直結する\n│  ├─ 金額が適正\n│  └─ 優先順位が高い\n├─ 実現可能性\n│  ├─ 実行体制がある\n│  ├─ 資金調達が可能\n│  └─ スケジュールが現実的\n└─ 効果測定\n   ├─ 売上・利益効果\n   ├─ 生産性向上\n   └─ KPI設定", "alt": "・ロジックモデル：投入→活動→成果→効果で見る\n・SMART：目標設定の妥当性を見る\n・SWOT：投資が強み・機会に合っているかを見る"}, {"theme": "企業の強みを見極める観点を分解せよ", "answers": ["顧客から評価されている価値", "競合が真似しにくい資源", "収益に結びつく能力", "組織的に再現できる仕組み"], "explanation": "強み分析では、会社が自分で強みと思っていることではなく、顧客に選ばれる理由かどうかが重要です。さらに、競合が簡単に真似できるものは持続的な強みになりにくいです。収益に結びつくか、個人依存ではなく組織として再現できるかも確認します。これはVRIO分析に近い考え方で、診断士の現場では『本当に強みと言えるのか』を冷静に見極める力が求められます。", "tree": "企業の強みを見極める\n├─ 顧客から評価されている価値\n│  ├─ 選ばれる理由\n│  ├─ 顧客満足\n│  └─ 継続取引\n├─ 競合が真似しにくい資源\n│  ├─ 技術\n│  ├─ ノウハウ\n│  └─ 関係性\n├─ 収益に結びつく能力\n│  ├─ 高単価化\n│  ├─ リピート\n│  └─ コスト優位\n└─ 組織的に再現できる仕組み\n   ├─ 標準化\n   ├─ 教育\n   └─ 情報共有", "alt": "・VRIO：価値、希少性、模倣困難性、組織\n・3C：顧客、自社、競合の比較\n・SWOT：強みと機会を結びつける"}, {"theme": "事業計画の実行可能性を評価する観点を分解せよ", "answers": ["人員体制", "資金計画", "スケジュール", "リスク対策"], "explanation": "事業計画は、アイデアや市場性だけでなく、本当に実行できるかを確認する必要があります。人員体制、資金計画、スケジュール、リスク対策の4つで見ると、実現可能性を評価しやすくなります。特に中小企業では、経営資源が限られているため、誰がやるのか、資金は足りるのか、いつまでに何をするのかが曖昧な計画は実行段階で止まりやすいです。", "tree": "事業計画の実行可能性\n├─ 人員体制\n│  ├─ 責任者がいる\n│  ├─ 必要スキルがある\n│  └─ 外部協力者がいる\n├─ 資金計画\n│  ├─ 初期投資\n│  ├─ 運転資金\n│  └─ 資金調達方法\n├─ スケジュール\n│  ├─ 主要マイルストーン\n│  ├─ 優先順位\n│  └─ 実施期間\n└─ リスク対策\n   ├─ 売上未達\n   ├─ コスト超過\n   └─ 人員不足", "alt": "・ヒト・モノ・カネ・情報で見る\n・SMART：計画目標の妥当性を見る\n・ロードマップ：短期、中期、長期で分ける"}, {"theme": "競合との差別化が弱い原因を分解せよ", "answers": ["顧客価値が曖昧", "商品・サービスの特徴が弱い", "伝え方が弱い", "模倣されやすい"], "explanation": "差別化は、単に他社と違うことではなく、顧客にとって意味のある違いである必要があります。顧客価値が曖昧、商品特徴が弱い、伝え方が弱い、真似されやすいという4つで分解すると、どこを強化すべきかが見えます。診断士的には、差別化を『提供価値』『競合比較』『伝達』『持続性』で見ると、表面的なキャッチコピーではなく戦略的な議論になります。", "tree": "競合との差別化が弱い\n├─ 顧客価値が曖昧\n│  ├─ 誰の課題を解くか不明\n│  ├─ 利用メリットが弱い\n│  └─ 顧客の声を拾えていない\n├─ 商品・サービスの特徴が弱い\n│  ├─ 品質差が小さい\n│  ├─ 体験価値が弱い\n│  └─ 独自機能がない\n├─ 伝え方が弱い\n│  ├─ メッセージが曖昧\n│  ├─ 訴求媒体が合わない\n│  └─ 実績・証拠が不足\n└─ 模倣されやすい\n   ├─ ノウハウ化できていない\n   ├─ 関係性が弱い\n   └─ ブランド蓄積が少ない", "alt": "・3C：顧客、自社、競合で差別化を探す\n・STP：狙う顧客とポジションを明確にする\n・VRIO：持続的な強みかを見る"}, {"theme": "店舗オペレーションの標準化が進まない原因を分解せよ", "answers": ["作業手順が見える化されていない", "例外対応が多い", "教育方法が属人的", "現場が標準化のメリットを感じていない"], "explanation": "標準化が進まない理由は、マニュアルがないだけではありません。作業手順の見える化、例外対応の多さ、教育の属人性、現場の納得感の4つで分けると考えやすいです。標準化は現場の自由を奪うものではなく、品質を安定させ、教育を早くし、改善の土台を作るものです。ロジカルシンキングでは、標準化できない原因を『作業』『例外』『教育』『心理』に分けて見ると、打ち手が具体化します。", "tree": "標準化が進まない\n├─ 作業手順が見える化されていない\n│  ├─ マニュアルがない\n│  ├─ 作業時間が不明\n│  └─ 品質基準が曖昧\n├─ 例外対応が多い\n│  ├─ 顧客要望が多様\n│  ├─ 商品・サービスが複雑\n│  └─ 判断基準がない\n├─ 教育方法が属人的\n│  ├─ OJT任せ\n│  ├─ 教える人で差が出る\n│  └─ 習熟確認がない\n└─ メリットを感じていない\n   ├─ 現場負担に見える\n   ├─ 改善効果が見えない\n   └─ 経営側の説明不足", "alt": "・5S：整理、整頓、清掃、清潔、躾\n・ECRS：標準化前に作業改善を行う\n・業務フロー：入力、作業、確認、引継ぎで見る"}, {"theme": "顧客単価を上げる施策を評価する観点を分解せよ", "answers": ["顧客価値への影響", "利益率への影響", "現場負荷", "顧客離れリスク"], "explanation": "客単価を上げる施策は、単純に値上げすればよいわけではありません。顧客が価値を感じるか、利益率が改善するか、現場オペレーションに無理がないか、顧客離れのリスクがないかで評価します。診断士の議論では、施策案を出した後に評価軸で比較することが重要です。これにより、感覚的な『良さそう』ではなく、効果と実現可能性の両面から判断できます。", "tree": "客単価向上施策の評価\n├─ 顧客価値への影響\n│  ├─ 満足度が上がる\n│  ├─ 納得感がある\n│  └─ 体験価値が高い\n├─ 利益率への影響\n│  ├─ 粗利が増える\n│  ├─ 原価率が適正\n│  └─ 高粗利商品へ誘導できる\n├─ 現場負荷\n│  ├─ 説明が必要\n│  ├─ 調理・接客が複雑化\n│  └─ 教育が必要\n└─ 顧客離れリスク\n   ├─ 値上げ反発\n   ├─ 選択肢不足\n   └─ 競合流出", "alt": "・評価軸：効果、実行可能性、コスト、リスク\n・4P：価格、商品、販促、提供方法で見る\n・顧客セグメント別：常連、新規、高単価客で見る"}, {"theme": "生産計画がうまく機能しない原因を分解せよ", "answers": ["需要予測が不正確", "生産能力の把握が甘い", "工程間調整が弱い", "計画変更への対応が遅い"], "explanation": "生産計画は、需要と供給能力を結びつける仕組みです。機能しない原因は、需要予測、生産能力、工程間調整、変更対応に分けられます。計画が甘いと欠品や納期遅れ、過剰在庫につながります。ロジカルシンキングでは、生産計画を『予測→計画→実行→変更対応』というプロセスとして見ると、どこに弱点があるかを特定しやすくなります。", "tree": "生産計画が機能しない\n├─ 需要予測が不正確\n│  ├─ 受注見込みが甘い\n│  ├─ 季節変動を反映できない\n│  └─ 営業情報が共有されない\n├─ 生産能力の把握が甘い\n│  ├─ 設備能力が不明\n│  ├─ 人員能力が不明\n│  └─ 段取り時間を考慮していない\n├─ 工程間調整が弱い\n│  ├─ 前工程・後工程の連携不足\n│  ├─ 仕掛品が多い\n│  └─ 優先順位が曖昧\n└─ 計画変更への対応が遅い\n   ├─ 緊急受注に弱い\n   ├─ 材料手配が遅れる\n   └─ 情報共有が遅い", "alt": "・PSI：販売、在庫、生産の整合で見る\n・QCD：納期、コスト、品質への影響で見る\n・ボトルネック分析：制約工程を中心に見る"}, {"theme": "顧客ニーズ調査がうまくいかない原因を分解せよ", "answers": ["調査目的が曖昧", "対象者がズレている", "質問設計が悪い", "分析・活用方法が決まっていない"], "explanation": "ニーズ調査は、聞けばよいというものではありません。何を明らかにしたいのか、誰に聞くのか、どのように聞くのか、得た情報をどう使うのかを分けて考える必要があります。目的が曖昧だと質問も曖昧になり、対象者がズレると使えない結果になります。ロジカルシンキングでは、調査を『目的→対象→質問→分析活用』というプロセスで設計することが重要です。", "tree": "顧客ニーズ調査がうまくいかない\n├─ 調査目的が曖昧\n│  ├─ 知りたいことが不明\n│  ├─ 意思決定とつながらない\n│  └─ 仮説がない\n├─ 対象者がズレている\n│  ├─ 既存客だけに偏る\n│  ├─ ターゲット外に聞いている\n│  └─ サンプル数が不足\n├─ 質問設計が悪い\n│  ├─ 誘導質問が多い\n│  ├─ 抽象的すぎる\n│  └─ 行動事実を聞けていない\n└─ 分析・活用方法が未定\n   ├─ 集計だけで終わる\n   ├─ 施策に落ちない\n   └─ 優先順位が決まらない", "alt": "・仮説検証：仮説→質問→検証→施策\n・顧客セグメント：新規、既存、離反で分ける\n・ジョブ理論：顧客が片づけたい用事で見る"}];
var currentPage = 0;
var pageSize = 5;
var currentList = questions.slice();

function esc(s){
 return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function shuffle(a){
 var b=a.slice();
 for(var i=b.length-1;i>0;i--){
  var j=Math.floor(Math.random()*(i+1));
  var t=b[i]; b[i]=b[j]; b[j]=t;
 }
 return b;
}
function showPage(){
 var start=currentPage*pageSize;
 var end=start+pageSize;
 var list=currentList.slice(start,end);
 var html="";
 for(var i=0;i<list.length;i++){
  var q=list[i];
  var qNo=start+i+1;
  var originalIndex = questions.indexOf(q);
  var newMark = originalIndex >= 30 ? '<span class="newBadge">追加</span>' : '';
  html+='<div class="card"><span class="badge">Q'+qNo+'</span>'+newMark+'<h2>'+esc(q.theme)+'</h2>';
  html+='<button class="toggleBtn">分解例と解説を見る／閉じる</button>';
  html+='<div class="hiddenBlock"><div class="answer-title">一次分解例</div><ul>';
  for(var k=0;k<q.answers.length;k++){html+='<li>'+esc(q.answers[k])+'</li>';}
  html+='</ul>';
  html+='<div class="explain-title">ロジカルシンキング解説</div>'+esc(q.explanation);
  html+='<div class="tree-title">詳しいロジックツリー例</div><pre>'+esc(q.tree)+'</pre>';
  html+='<div class="alt-title">別の切り口・使えるフレームワーク</div><div class="altBox">'+esc(q.alt)+'</div>';
  html+='</div></div>';
 }
 document.getElementById("app").innerHTML=html;
 attachToggle();
 updateNav();
 window.scrollTo(0,0);
}
function attachToggle(){
 var btns=document.getElementsByClassName("toggleBtn");
 for(var n=0;n<btns.length;n++){
  btns[n].onclick=function(){
   var x=this.nextElementSibling;
   if(x.style.display==="block"){x.style.display="none";}
   else{x.style.display="block";}
  };
 }
}
function updateNav(){
 var maxPage=Math.ceil(currentList.length/pageSize);
 var text="ページ "+(currentPage+1)+" / "+maxPage+"（全"+currentList.length+"問）";
 document.getElementById("pageInfo").innerHTML=text;
 document.getElementById("pageInfo2").innerHTML=text;
 var isFirst=currentPage===0;
 var isLast=currentPage>=maxPage-1;
 document.getElementById("prevBtn").disabled=isFirst;
 document.getElementById("prevBtn2").disabled=isFirst;
 document.getElementById("nextBtn").disabled=isLast;
 document.getElementById("nextBtn2").disabled=isLast;
}
function nextPage(){
 var maxPage=Math.ceil(currentList.length/pageSize);
 if(currentPage<maxPage-1){currentPage++;showPage();}
}
function prevPage(){
 if(currentPage>0){currentPage--;showPage();}
}
function randomFive(){
 currentList=shuffle(questions).slice(0,5);
 currentPage=0;
 showPage();
}
function startAll(){
 currentList=questions.slice();
 currentPage=0;
 showPage();
}
document.getElementById("nextBtn").onclick=nextPage;
document.getElementById("nextBtn2").onclick=nextPage;
document.getElementById("prevBtn").onclick=prevPage;
document.getElementById("prevBtn2").onclick=prevPage;
document.getElementById("randomBtn").onclick=randomFive;
document.getElementById("allStartBtn").onclick=startAll;
startAll();
</script>
</body>
</html>
